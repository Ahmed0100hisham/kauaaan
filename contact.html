<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"><script src="app.js" defer></script>
</head>
<body class="lang-ar" data-page="contact">
<header id="header"></header>

<section class="phero"><div class="wrap">
  <p class="crumbs"><span data-ar="الرئيسية / تواصل" data-en="Home / Contact"></span></p>
  <span class="eyebrow" data-ar="تواصل معنا" data-en="Get in touch"></span>
  <h1 data-ar="جاهز <em>نبدأ</em> مشروعك" data-en="Ready to <em>start</em> your project"></h1>
  <p data-ar="املأ النموذج وهيتفتح واتساب برسالة جاهزة، أو اتصل بأي رقم تحت لمعاينة وعرض سعر مجاني." data-en="Fill the form and WhatsApp opens with a ready message, or call any number below for a free site visit and quote."></p>
</div></section>

<section class="section tight" id="quote"><div class="wrap"><div class="quote reveal">
  <div class="ql">
    <span class="eyebrow" data-ar="عرض سعر سريع" data-en="Quick quote"></span>
    <h2 data-ar="احصل على <em>عرض سعر</em> في دقيقة" data-en="Get a <em>quote</em> in a minute"></h2>
    <p data-ar="اختر الخدمات ونوع المساحة واكتب بياناتك، وهنرد عليك بمعاينة وعرض سعر مجاني." data-en="Pick your services and space type, add your details, and we'll reply with a free site visit and quote."></p>
  </div>
  <div class="qform">
    <div class="qrow"><label data-ar="الخدمات المطلوبة" data-en="Services needed"></label>
      <div class="qchips" id="chips">
        <button class="chip" data-v="دهانات جوتن" data-ar="دهانات جوتن" data-en="Jotun Paints"></button>
        <button class="chip" data-v="جيبس بورد" data-ar="جيبس بورد" data-en="Gypsum"></button>
        <button class="chip" data-v="بديل خشب" data-ar="بديل خشب" data-en="Wood Alt."></button>
        <button class="chip" data-v="بديل رخام" data-ar="بديل رخام" data-en="Marble Alt."></button>
        <button class="chip" data-v="تشطيب كامل" data-ar="تشطيب كامل" data-en="Full Finishing"></button>
        <button class="chip" data-v="ديكور" data-ar="ديكور" data-en="Decor"></button>
      </div>
    </div>
    <div class="qrow"><label data-ar="نوع المساحة" data-en="Space type"></label>
      <select id="qspace">
        <option value="شقة" data-ar="شقة" data-en="Apartment"></option>
        <option value="فيلا" data-ar="فيلا" data-en="Villa"></option>
        <option value="محل" data-ar="محل تجاري" data-en="Shop"></option>
        <option value="مكتب" data-ar="مكتب" data-en="Office"></option>
      </select>
    </div>
    <div class="qrow"><label data-ar="المساحة التقريبية (متر مربع)" data-en="Approx. area (m²)"></label><input id="qarea" type="number" min="1" placeholder="120"></div>
    <div class="qrow"><label data-ar="اسمك" data-en="Your name"></label><input id="qname" type="text" placeholder="..."></div>
    <button class="btn btn--wa" id="qsend" style="width:100%"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1 1 12 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5.1a6.5 6.5 0 0 1-1.9-1.2 7.2 7.2 0 0 1-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a1 1 0 0 0-.7.3 3 3 0 0 0-.9 2.2 5.2 5.2 0 0 0 1.1 2.7 11.8 11.8 0 0 0 4.5 4c.6.3 1.1.4 1.5.5a3.6 3.6 0 0 0 1.6.1c.5-.1 1.4-.6 1.6-1.1s.2-1 .1-1.1z"/></svg><span data-ar="إرسال الطلب عبر واتساب" data-en="Send request via WhatsApp"></span></button>
    <p class="qnote" data-ar="هيتفتح واتساب برسالة جاهزة فيها اختياراتك" data-en="WhatsApp will open with your selections pre-filled"></p>
  </div>
</div></div></section>

<section class="section" style="padding-top:0"><div class="wrap"><div class="contact reveal">
  <div class="ct-head"><span class="eyebrow" style="color:#e8b48f" data-ar="أرقام التواصل" data-en="Call us"></span><h2 data-ar="كلّمنا <em>مباشرة</em>" data-en="Call us <em>directly</em>"></h2><p data-ar="اتصل أو راسلنا واتساب على أي رقم." data-en="Call or WhatsApp us on any number."></p></div>
  <div class="phones">
    <a class="phone" href="tel:+201110281354"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span><span class="lbl" data-ar="اتصال / واتساب" data-en="Call / WhatsApp"></span><b>0111 028 1354</b></a>
    <a class="phone" href="tel:+201117402906"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span><span class="lbl" data-ar="اتصال / واتساب" data-en="Call / WhatsApp"></span><b>0111 740 2906</b></a>
    <a class="phone" href="tel:+201011953106"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span><span class="lbl" data-ar="اتصال / واتساب" data-en="Call / WhatsApp"></span><b>0101 195 3106</b></a>
    <a class="phone" href="tel:+201044111073"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span><span class="lbl" data-ar="اتصال / واتساب" data-en="Call / WhatsApp"></span><b>0104 411 1073</b></a>
  </div>
  <div class="ct-actions"><a class="btn btn--wa" href="https://wa.me/201110281354" target="_blank"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.3A10 10 0 1 0 12 2z"/></svg><span data-ar="راسلنا عبر واتساب" data-en="Message on WhatsApp"></span></a></div>
</div></div></section>

<section class="section" style="padding-top:0"><div class="wrap">
  <div class="section-head reveal"><span class="eyebrow" data-ar="أسئلة شائعة" data-en="FAQ"></span><h2 data-ar="إجاباتٌ عن <em>أهم أسئلتك</em>" data-en="Answers to your <em>top questions</em>"></h2></div>
  <div class="faq reveal">
    <div class="qa"><button><span data-ar="هل المعاينة وعرض السعر مجانًا؟" data-en="Is the visit and quote free?"></span><span class="ic">+</span></button><div class="ans"><p data-ar="نعم، المعاينة وعرض السعر مجانيان تمامًا وبدون أي التزام." data-en="Yes — the on-site visit and quote are completely free with no obligation."></p></div></div>
    <div class="qa"><button><span data-ar="ما المناطق التي تغطّونها؟" data-en="Which areas do you cover?"></span><span class="ic">+</span></button><div class="ans"><p data-ar="نعمل في القاهرة والجيزة والمدن الجديدة، وللمشاريع الكبيرة نُغطّي محافظات أخرى." data-en="We work across Cairo, Giza, and new cities; for larger projects we cover other governorates."></p></div></div>
    <div class="qa"><button><span data-ar="هل تستخدمون دهانات جوتن الأصلية؟" data-en="Do you use original Jotun paints?"></span><span class="ic">+</span></button><div class="ans"><p data-ar="نعم، نحن معتمدون لتطبيق منتجات جوتن الأصلية بضمان الجودة." data-en="Yes — we are certified to apply original Jotun products with a quality guarantee."></p></div></div>
    <div class="qa"><button><span data-ar="كم يستغرق تشطيب شقة؟" data-en="How long does finishing take?"></span><span class="ic">+</span></button><div class="ans"><p data-ar="يختلف حسب المساحة ونطاق العمل، ونحدّد جدولًا زمنيًا واضحًا قبل البدء ونلتزم به." data-en="It depends on area and scope; we set a clear timeline before starting and commit to it."></p></div></div>
  </div>
</div></section>
