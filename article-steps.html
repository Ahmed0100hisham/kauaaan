<article class="article" style="padding-top:48px;padding-bottom:60px">
  <p class="crumbs"><a href="blog.html" data-ar="المدونة" data-en="Blog"></a> <span data-ar="/ خطوات التشطيب" data-en="/ Finishing steps"></span></p>
  <div class="meta" data-ar="تشطيب · 7 دقائق قراءة" data-en="Finishing · 7 min read"></div>
  <h1 data-ar="خطوات تشطيب شقة من المحارة للتسليم" data-en="Finishing an apartment: from shell to handover"></h1>
  <div class="hero-img"><img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=1100&q=80" alt=""></div>

  <p class="lead" data-ar="ترتيب مراحل التشطيب الصح بيوفّر عليك وقت وفلوس وبيمنع أخطاء كتير. ده الترتيب اللي بنمشي عليه في كيان." data-en="Following the right order of finishing stages saves time and money and prevents many mistakes. This is the sequence we follow at Kayan."></p>

  <h2 data-ar="١. الأعمال الصحية والكهرباء (التأسيس)" data-en="1. Plumbing &amp; electrical (rough-in)"></h2>
  <p data-ar="بنبدأ بتمديدات السباكة والكهرباء داخل الحوائط والأرضيات قبل أي تشطيب نهائي، عشان نتجنّب التكسير بعدين." data-en="We start with plumbing and electrical runs inside walls and floors before any final finish — to avoid breaking things later."></p>

  <h2 data-ar="٢. المحارة وتجهيز الأسطح" data-en="2. Plastering &amp; surface prep"></h2>
  <p data-ar="ضبط استواء الحوائط والأسطح هو الأساس لأي تشطيب نظيف بعد كده، سواء دهان أو سيراميك أو كسوات." data-en="Leveling walls and surfaces is the foundation for any clean finish afterwards — paint, tiles, or cladding."></p>

  <h2 data-ar="٣. الأرضيات والسيراميك" data-en="3. Flooring &amp; tiling"></h2>
  <p data-ar="بنركّب الأرضيات والسيراميك في الحمامات والمطابخ، مع مراعاة الميول والعزل المناسب." data-en="We install flooring and tiles in bathrooms and kitchens, with proper slopes and waterproofing."></p>

  <h2 data-ar="٤. الجيبس بورد والأسقف" data-en="4. Gypsum board &amp; ceilings"></h2>
  <p data-ar="تنفيذ الأسقف الديكورية والإضاءة المخفية قبل مرحلة الدهان النهائي." data-en="Decorative ceilings and hidden lighting are done before the final paint stage."></p>

  <h2 data-ar="٥. الدهانات النهائية" data-en="5. Final painting"></h2>
  <p data-ar="مرحلة الدهان بتيجي في الآخر تقريبًا، بعد تجهيز الحوائط، وبتدّي المكان شكله النهائي." data-en="Painting comes near the end, after wall prep, giving the space its final look."></p>

  <h2 data-ar="٦. التشطيبات الأخيرة والتسليم" data-en="6. Final touches &amp; handover"></h2>
  <p data-ar="تركيب الإكسسوارات والإنارة والأبواب، ثم تنظيف شامل وتسليم المكان جاهز للسكن." data-en="Fitting accessories, lighting, and doors, then a thorough clean and handover — ready to live in."></p>

  <blockquote data-ar="«الترتيب الصحيح للمراحل بيفرق في الجودة والتكلفة والوقت.»" data-en="“The right order of stages makes the difference in quality, cost, and time.”"></blockquote>

  <p data-ar="في كيان بندير المشروع كامل بفريق واحد وبجدول زمني واضح من المعاينة للتسليم. عايز نبدأ؟" data-en="At Kayan we manage the whole project with one team and a clear timeline from visit to handover. Ready to start?"></p>

  <p style="margin-top:30px"><a href="contact.html#quote" class="btn" data-ar="ابدأ مشروعك معنا" data-en="Start your project with us"></a></p>
